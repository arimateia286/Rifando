<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sorteando</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
  <script src="utils.js" defer></script>
  <script src="sorteio.js" defer></script>
</head>

<body>
  <header class="header">
    <button id="home-button" onclick="goHome()">
      <i class="fa-solid fa-house icon"></i>
    </button>
    <h4>Sorteando</h4>
  </header>

  <div class="main-container centered">
    <div id="infos-rifa"></div>
    <button id="ver-button" class="glassy">Ver Participantes</button>
    <div id="participante">
      <div id="numero-participante"><span style="font-family: 'SuperUnicorn';">Rifando</span></div>
      <div id="nome-participante">Boa sorte!</div>
    </div>

    <div id="sortear-container">
      <div id="checkbox-container">
        <input type="checkbox" id="checkbox-participante">
        <label for="checkbox-participante">Incluir não pagos</label>
      </div>
      <button id="sortear-button" class="glassy">Sortear</button>
    </div>
  </div>

  <div id="participantes-dialog" class="dialog-container hidden">
    <dialog class="generic-dialog">
      <div class="dialog-button">PARTICIPANTES</div>

      <div id="ptable-container">
        <table id="participantes-table">
          <thead>
            <tr>
              <th>Número</th>
              <th>Nome</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <div id="ok-button" class="dialog-button" onclick="closeParticipantesDialog()">
        FECHAR</div>

    </dialog>
  </div>

  <audio id="audio-win" src="sounds/aeee.mp3" preload="auto"></audio>
</body>

</html>
