<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sorteando</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
  <script src="utils.js" defer></script>
  <script src="sorteio.js" defer></script>
</head>

<body>
  <header class="header">
    <button id="home-button" aria-label="Voltar para a página inicial">
      <i class="fa-solid fa-house"></i>
    </button>
    <h4 id="app-name" class="font-super-unicorn">Sorteando</h4>
    <button id="ver-button" aria-label="Ver Participantes">
      <i class="fa-solid fa-people-group"></i>
    </button>
  </header>

  <main class="main-container centered">
    <div id="infos-rifa"></div>

    <section id="participante" aria-live="polite" aria-atomic="true">
      <div id="numero-participante"><span class="font-super-unicorn">Rifando</span></div>
      <div id="nome-participante">Boa sorte!</div>
    </section>

    <div id="sortear-container">
      <div id="checkbox-container">
        <input type="checkbox" id="checkbox-participante">
        <label for="checkbox-participante">Incluir não pagos</label>
      </div>
      <button id="sortear-button" class="glassy">Sortear</button>
    </div>
  </main>

  <div id="participantes-dialog" class="dialog-container hidden">
    <dialog class="generic-dialog" open>
      <header class="dialog-button">PARTICIPANTES</header>

      <div id="ptable-container">
        <table id="participantes-table">
          <thead>
            <tr>
              <th scope="col">Número</th>
              <th scope="col">Nome</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <button id="ok-button" class="dialog-button">FECHAR</button>
    </dialog>
  </div>

  <audio id="audio-win" src="sounds/aeee.mp3" preload="auto"></audio>
</body>

</html>
